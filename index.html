  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0d0f0e;
      --bg2: #111410;
      --surface: #161a15;
      --border: #232820;
      --border2: #2e342b;
      --green: #4ade80;
      --green-dim: #22c55e;
      --green-glow: rgba(74,222,128,0.12);
      --green-glow2: rgba(74,222,128,0.06);
      --text: #e2e8df;       /* 15.7:1 contrast — main text */
      --text-muted: #aabca8; /* 9.7:1  contrast — body copy, was #7a8c78 at 2.1:1 */
      --text-dim: #8fa08d;   /* 7.0:1  contrast — dates, labels, secondary info */
      --text-xdim: #4a5a48;  /* decorative only — always paired with aria-hidden */
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    /* SCREEN READER ONLY */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
      pointer-events: none;
      z-index: 999;
    }
    a { color: inherit; text-decoration: none; }

    /* FOCUS — visible keyboard outline */
    a:focus-visible,
    button:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 3px;
      border-radius: 2px;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 18px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(13,15,14,0.92);
      backdrop-filter: blur(12px);
    }
    .nav-logo { font-size: 13px; font-weight: 500; letter-spacing: 0.08em; color: var(--text-muted); }
    .nav-logo span { color: var(--green); }
    .nav-sub { font-size: 11px; color: var(--text-xdim); letter-spacing: 0.1em; text-transform: uppercase; }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      font-size: 12px; color: var(--text-muted); letter-spacing: 0.06em;
      transition: color 0.2s; position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -2px; left: 0;
      width: 0; height: 1px; background: var(--green); transition: width 0.2s;
    }
    .nav-links a:hover { color: var(--green); }
    .nav-links a:hover::after { width: 100%; }
    .nav-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* LAYOUT */
    main { max-width: 900px; margin: 0 auto; padding: 140px 48px 80px; }
    section { margin-bottom: 100px; }

    /* HERO */
    .hero { padding-top: 20px; }
    .hero-eyebrow { font-size: 12px; color: var(--text-xdim); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 28px; }
    .hero-eyebrow span { color: var(--green); }
    h1.hero-name {
      font-family: var(--mono);
      font-size: clamp(42px,7vw,72px);
      font-weight: 600; line-height: 1.0; letter-spacing: -0.02em;
      color: var(--text); margin-bottom: 8px;
    }
    .hero-name .cursor { display: inline-block; color: var(--green); animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .hero-tagline { font-size: 12px; color: var(--text-dim); letter-spacing: 0.08em; margin-bottom: 40px; }
    .hero-bio {
      font-family: var(--sans); font-size: 16px; font-weight: 300;
      line-height: 1.8; color: var(--text-muted); max-width: 640px; margin-bottom: 36px;
    }
    .hero-bio strong { color: var(--text); font-weight: 500; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      padding: 4px 10px; border: 1px solid var(--border2);
      color: var(--text-dim); background: var(--surface); transition: all 0.2s;
    }
    .tag:hover { border-color: var(--green); color: var(--green); background: var(--green-glow2); }

    /* SECTION HEADER */
    .section-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 40px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    h2.section-title {
      font-size: 12px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-muted);
      margin: 0; padding: 0; /* reset h2 browser defaults */
    }
    .section-count { font-size: 11px; color: var(--text-dim); }
    .section-count span { color: var(--green); }

    /* PROJECTS */
    .project-card {
      border: 1px solid var(--border); background: var(--surface);
      padding: 28px 32px; margin-bottom: 2px;
      transition: all 0.25s; position: relative; overflow: hidden;
    }
    .project-card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 2px; height: 0; background: var(--green); transition: height 0.3s;
    }
    .project-card:hover { border-color: var(--border2); background: var(--bg2); }
    .project-card:hover::before { height: 100%; }
    .project-num { font-size: 11px; color: var(--green); letter-spacing: 0.1em; margin-bottom: 6px; }
    h3.project-title {
      font-size: 15px; font-weight: 500; color: var(--text);
      letter-spacing: 0.02em; margin: 0 0 12px 0;
    }
